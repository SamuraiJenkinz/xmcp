<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Atlas &mdash; Exchange Assistant{% endblock %}</title>
    <script>
    (function() {
        'use strict';
        var stored = localStorage.getItem('atlas-theme');
        if (stored === 'dark' || stored === 'light') {
            document.documentElement.setAttribute('data-theme', stored);
        } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    })();
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header class="app-header">
        <div class="header-left">
            <span class="app-logo">&#9889;</span>
            <span class="app-name">Atlas</span>
        </div>
        <div class="header-right">
            <button class="theme-toggle" id="theme-toggle" type="button" title="Toggle dark mode" aria-label="Toggle dark mode">
                <span class="theme-toggle-icon" id="theme-toggle-icon">&#9788;</span>
            </button>
            {% if session.get('user') %}
            <span class="status-indicator connected" id="status-indicator" title="Connected">&#9679;</span>
            <span class="user-name">{{ session['user'].get('name', 'User') }}</span>
            <a href="{{ url_for('auth.logout') }}" class="logout-link">Sign out</a>
            {% endif %}
        </div>
    </header>
    <main class="app-main">
        {% block content %}{% endblock %}
    </main>
    {% block scripts %}{% endblock %}
</body>
</html>
